spring.application.name=CanchAPP_Back
server.port=8080

# Desactivamos el Config Server para evitar reintentos fallidos en el puerto 8888
spring.cloud.config.enabled=false
spring.main.allow-bean-definition-overriding=true

# ==========================================
# CONEXIėN A SUPABASE (SESSION POOLER)
# ==========================================
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.vgxplgdphahdsqjbberj
spring.datasource.password=C4nch42026//
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraciones de Hikari (El gestor de conexiones) para evitar cortes
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=10000

# ==========================================
# JPA / HIBERNATE (CONFIGURACIėN ANTI-ERRORES)
# ==========================================
# 1. Saltamos la consulta de metadata que estß causando el NullPointerException
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# 2. Le decimos explĒcitamente que es PostgreSQL para que no tenga que adivinarlo
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BOOLEAN
